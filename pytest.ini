[pytest]
pythonpath = .
asyncio_mode = auto
markers =
    slow: hits external APIs (weather, CoinGecko, Gemini)
    testnet: requires funded ORACLE_MNEMONIC and APP_ID on Algorand testnet
    e2e: full supply-chain flow on testnet
filterwarnings =
    ignore::pydantic.warnings.PydanticDeprecatedSince20
