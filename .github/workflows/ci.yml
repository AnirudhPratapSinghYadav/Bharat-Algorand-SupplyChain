name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
      - run: pip install -r requirements.txt pytest pip-audit
      - run: pip-audit -r requirements.txt
        continue-on-error: true
      - run: pytest -q

  contract-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smart_contracts/navi_trust
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Algokit + Poetry
        run: |
          python -m pip install --upgrade pip
          pip install algokit poetry
          algokit --version
          poetry --version
      - name: Install contract dependencies
        run: poetry install --no-interaction
      - name: algokit project run build
        run: algokit project run build
      - name: Committed root ARC56 present (backend reads this path)
        run: test -f "${{ github.workspace }}/artifacts/NaviTrust.arc56.json"
